<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://images.unsplash.com">
    <link rel="dns-prefetch" href="https://raw.githubusercontent.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;750;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@700;800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;750;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@700;800&display=swap" rel="stylesheet">
    <script>
      // Early internal theme detection
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'light';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <meta name="theme-color" content="#dc2626" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Application Hub</title>
    <meta name="description" content="Access application details and specifications." />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta property="og:title" content="Application Hub" />
    <meta property="og:description" content="Access application details and specifications." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Application Hub" />
    <meta name="twitter:description" content="Access application details and specifications." />
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; font-family: sans-serif; text-align: center; color: #333;">
        <h2>JavaScript is required</h2>
        <p>Please enable JavaScript in your browser settings to use this application.</p>
      </div>
    </noscript>
    <div id="root">

      <style>
        .initial-loader {
          position: fixed; top: 0; left: 0; right: 0; bottom: 0;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          background: #ffffff; z-index: 99999; transition: opacity 0.3s;
        }
        @media (prefers-color-scheme: dark) {
          .initial-loader { background: #18181b; }
        }
        html.dark .initial-loader { background: #18181b; }
        .spinner {
          width: 32px; height: 32px;
          border: 3px solid rgba(59, 130, 246, 0.1);
          border-top-color: #3b82f6;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
      </style>
      <div class="initial-loader" id="initial-loader">
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
