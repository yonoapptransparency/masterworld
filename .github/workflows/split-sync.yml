name: Dual Repo Split & Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  split-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Sync and Split Repositories
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          set -e
          git config --global user.email "yonoapptransparency@example.com"
          git config --global user.name "yonoapptransparency"

          # List of files that should ONLY exist in Masterworld (Admin)
          ADMIN_ONLY_FILES=(
            "src/pages/AdminDashboard.tsx"
            "src/pages/AdminLogin.tsx"
            "src/components/AdminLogin.tsx"
            "src/components/NewsTab.tsx"
            "src/components/SecurityTab.tsx"
            "src/components/FirebaseStatusPanel.tsx"
            "src/components/ClearanceButton.tsx"
            "src/lib/githubSync.ts"
            "api/"
            "server.ts"
            "firebase-applet-config.json"
            "firestore.rules"
            "firebase.json"
            "scripts/"
          )

          SOURCE_DIR=$(pwd)
          PARENT_DIR=$(dirname "$SOURCE_DIR")

          sync_repo() {
            REPO_NAME=$1
            REPO_URL=$2
            IS_PUBLIC=$3

            echo "--- Syncing to $REPO_NAME ---"
            cd "$PARENT_DIR"
            rm -rf "${REPO_NAME}_repo"
            
            if git clone "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git" "${REPO_NAME}_repo"; then
              cd "${REPO_NAME}_repo"
              git checkout -b main || git checkout main
              rsync -rv --exclude='.git' --exclude='node_modules' --exclude='dist' --delete "$SOURCE_DIR/" .
            else
              mkdir -p "${REPO_NAME}_repo"
              cd "${REPO_NAME}_repo"
              git init
              git remote add origin "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git"
              git checkout -b main
              rsync -rv --exclude='.git' --exclude='node_modules' --exclude='dist' "$SOURCE_DIR/" .
            fi

            if [ "$IS_PUBLIC" = "true" ]; then
              echo "Cleaning admin files from $REPO_NAME..."
              for file in "${ADMIN_ONLY_FILES[@]}"; do
                rm -rf "$file"
              done
            fi

            git add .
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Auto-sync from source [skip ci]"
              git push -u origin main
            else
              echo "No changes for $REPO_NAME."
            fi
          }

          sync_repo "masterworld" "yonoapptransparency/masterworld" "false"
          sync_repo "Dex" "yonoapptransparency/Dex" "true"

