name: Dual Repo Split & Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  split-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Sync and Split Repositories
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "${{ github.event.head_commit.author.name || 'yonoapptransparency' }}"

          # List of files that should ONLY exist in Masterworld (Admin)
          ADMIN_ONLY_FILES=(
            "src/pages/AdminDashboard.tsx"
            "src/pages/AdminLogin.tsx"
            "src/components/AdminLogin.tsx"
            "src/components/NewsTab.tsx"
            "src/components/SecurityTab.tsx"
            "src/components/FirebaseStatusPanel.tsx"
            "src/components/FirebaseStatusIndicator.tsx"
            "src/components/AppsTab.tsx"
            "src/components/BlogsTab.tsx"
            "src/components/ClearanceButton.tsx"
            "src/services/adminAuthService.ts"
            "src/lib/githubSync.ts"
            "src/lib/totp.ts"
            "src/lib/secureStorage.ts"
            "src/lib/secure_links_backup.json"
            "src/lib/public_backup.json"
            "api/"
            "server.ts"
            "firebase-applet-config.json"
            "firestore.rules"
            "firebase.json"
            ".firebaserc"
            "bun.lock"
            "scripts/"
            "add-admin-rest.ts"
            "add-admin.ts"
            "add_save_button.js"
            "check-env.ts"
            "debug-db.js"
            "dom.html"
            "extract.js"
            "fetch_git_cfg.js"
            "fetch_real_git_cfg.js"
            "fetch_rest.js"
            "find_app_cache.js"
            "fix-admin.ts"
            "fix-aes.ts"
            "fix-api.ts"
            "fix-dashboard.ts"
            "fix-download.ts"
            "fix-missing-urls.cjs"
            "fix-seo.js"
            "fix-seo.ts"
            "fix_admin_dashboard.js"
            "fix_app_layout.js"
            "fix_appstab.js"
            "fix_css.js"
            "fix_css_performance.js"
            "fix_h2.js"
            "fix_header.js"
            "fix_home.js"
            "fix_home_layout.js"
            "fix_lazy.js"
            "fix_lenis.js"
            "fix_lenis_easing.js"
            "fix_lenis_settings.js"
            "fix_lenis_ultra.js"
            "fix_lenis_ultra2.js"
            "fix_loading.js"
            "fix_loading_all.js"
            "fix_loading_home.js"
            "fix_menu.js"
            "fix_news_published_at.js"
            "fix_news_seo.js"
            "fix_news_tab.js"
            "fix_newsdetail_date.js"
            "fix_newspage_date.js"
            "fix_routes.js"
            "fix_scroll.js"
            "fix_secrets.sh"
            "fix_server.js"
            "fix_server2.js"
            "fix_server3.js"
            "format.js"
            "get_git_config.ts"
            "insert_screenshots.js"
            "live_app.html"
            "metadata.json"
            "output.html"
            "patch.js"
            "patch2.js"
            "patch3.js"
            "patch4.js"
            "patch5.js"
            "patch6.js"
            "patch7.js"
            "patch8.js"
            "patch_menu.js"
            "print-env.ts"
            "remove_chatbot.js"
            "replace-color.mjs"
            "restore_app.js"
            "restore_header_footer.js"
            "temp_news_tab.txt"
            "test-admin-encrypt.js"
            "test-admin.js"
            "test-chat.ts"
            "test-chunk-item.cjs"
            "test-curl.ts"
            "test-fetch.ts"
            "test-firestore.ts"
            "test-gemini.ts"
            "test-models-all.ts"
            "test-payload.mjs"
            "test-pow.mjs"
            "test-secure-links.ts"
            "test.js"
            "test_pull.js"
            "update_app.js"
            "update_app_home.js"
            "update_appdetails.js"
            "update_dashboard.patch"
            "update_gateway.js"
            "update_home.js"
            "update_html.js"
            "update_loading.js"
            "update_vite.js"
            "verify-db.js"
            "verify-rules.js"
            "write_files.js"
          )

          SOURCE_DIR=$(pwd)
          PARENT_DIR=$(dirname "$SOURCE_DIR")

          sync_repo() {
            REPO_NAME=$1
            REPO_URL=$2
            IS_PUBLIC=$3

            echo "--- Syncing to $REPO_NAME ---"
            cd "$PARENT_DIR"
            rm -rf "${REPO_NAME}_repo"
            
            if [ "$IS_PUBLIC" = "true" ]; then
              # For Dex, we exclude content files from being overwritten by the stale source
              RSYNC_EXCLUDES="--exclude=.git --exclude=.github --exclude=node_modules --exclude=dist --exclude=src/lib/staticData.ts --exclude=src/lib/secureVault.ts"
            else
              RSYNC_EXCLUDES="--exclude=.git --exclude=node_modules --exclude=dist"
            fi

            if git clone "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git" "${REPO_NAME}_repo"; then
              cd "${REPO_NAME}_repo"
              git checkout -b main || git checkout main
              rsync -rv $RSYNC_EXCLUDES --delete "$SOURCE_DIR/" .
            else
              mkdir -p "${REPO_NAME}_repo"
              cd "${REPO_NAME}_repo"
              git init
              git remote add origin "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git"
              git checkout -b main
              rsync -rv $RSYNC_EXCLUDES "$SOURCE_DIR/" .
            fi

            if [ "$IS_PUBLIC" = "true" ]; then
              echo "Cleaning admin files from $REPO_NAME..."
              echo '{"version": 2, "outputDirectory": "dist", "buildCommand": "npm run build", "rewrites": [{ "source": "/(.*)", "destination": "/index.html" }]}' > vercel.json
              for file in "${ADMIN_ONLY_FILES[@]}"; do
                rm -rf "$file"
              done

              # Bulletproof safety net: strip any residual maintenance, test, or config files from root of Dex
              find . -maxdepth 1 -name "*.js" ! -name "eslint.config.mjs" ! -name "eslint.config.cjs" ! -name "postcss.config.js" ! -name "tailwind.config.js" -exec rm -f {} +
              find . -maxdepth 1 -name "*.ts" ! -name "vite.config.ts" -exec rm -f {} +
              find . -maxdepth 1 -name "*.sh" -exec rm -f {} +
              find . -maxdepth 1 -name "*.patch" -exec rm -f {} +
              find . -maxdepth 1 -name "*.html" ! -name "index.html" -exec rm -f {} +

              # Strip Admin source code completely
              if [ -f "rewrite-datacontext-for-dex.js" ]; then
                node rewrite-datacontext-for-dex.js
                rm -f rewrite-datacontext-for-dex.js
              fi
              if [ -f "strip-admin-from-dex.js" ]; then
                node strip-admin-from-dex.js
                rm -f strip-admin-from-dex.js
              fi
            else
              # IS_ADMIN (masterworld) - We must ENSURE that public static data is NOT committed to the admin repo
              echo "Cleaning public content data from $REPO_NAME (Admin/Masterworld)..."
              
              if [ -f "strip-public-from-masterworld.js" ]; then
                node strip-public-from-masterworld.js
                rm -f strip-public-from-masterworld.js
              fi
              
              # Cleanup scripts that shouldn't be in admin either
              find . -maxdepth 1 -name "patch-*.js" -exec rm -f {} +
              rm -f strip-admin-from-dex.js rewrite-datacontext-for-dex.js
            fi

            git add .
            if [ -n "$(git status --porcelain)" ]; then
              git commit -m "Auto-sync from source [skip ci]"
              git push -u origin main
            else
              echo "No changes for $REPO_NAME."
            fi
          }

          sync_repo "masterworld" "yonoapptransparency/masterworld" "false"
          sync_repo "Dex" "yonoapptransparency/Dex" "true"
