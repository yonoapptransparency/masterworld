name: Dual Repo Split & Sync

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  split-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync and Split Repositories
        env:
          PAT: ${{ secrets.PAT }}
        run: |
          set -e
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "${{ github.event.head_commit.author.name || 'yonoapptransparency' }}"

          # List of files that should ONLY exist in Masterworld (Admin)
          ADMIN_ONLY_FILES=(
            "src/pages/AdminDashboard.tsx"
            "src/pages/AdminLogin.tsx"
            "src/components/AdminLogin.tsx"
            "src/components/NewsTab.tsx"
            "src/components/SecurityTab.tsx"
            "src/components/FirebaseStatusPanel.tsx"
            "src/components/FirebaseStatusIndicator.tsx"
            "src/components/AppsTab.tsx"
            "src/components/BlogsTab.tsx"
            "src/components/ClearanceButton.tsx"
            "src/services/adminAuthService.ts"
            "src/lib/githubSync.ts"
            "src/lib/totp.ts"
            "src/lib/secureStorage.ts"
            "src/lib/secure_links_backup.json"
            "src/lib/public_backup.json"
            "api/"
            "server.ts"
            "firebase-applet-config.json"
            "firestore.rules"
            "firebase.json"
            ".firebaserc"
            "bun.lock"
            "scripts/"
            "add-admin-rest.ts"
            "add-admin.ts"
            "add_save_button.js"
            "check-env.ts"
            "debug-db.js"
            "dom.html"
            "extract.js"
            "fetch_git_cfg.js"
            "fetch_real_git_cfg.js"
            "fetch_rest.js"
            "find_app_cache.js"
            "fix-admin.ts"
            "fix-aes.ts"
            "fix-api.ts"
            "fix-dashboard.ts"
            "fix-download.ts"
            "fix-missing-urls.cjs"
            "fix-seo.js"
            "fix-seo.ts"
            "fix_admin_dashboard.js"
            "fix_app_layout.js"
            "fix_appstab.js"
            "fix_css.js"
            "fix_css_performance.js"
            "fix_h2.js"
            "fix_header.js"
            "fix_home.js"
            "fix_home_layout.js"
            "fix_lazy.js"
            "fix_lenis.js"
            "fix_lenis_easing.js"
            "fix_lenis_settings.js"
            "fix_lenis_ultra.js"
            "fix_lenis_ultra2.js"
            "fix_loading.js"
            "fix_loading_all.js"
            "fix_loading_home.js"
            "fix_menu.js"
            "fix_news_published_at.js"
            "fix_news_seo.js"
            "fix_news_tab.js"
            "fix_newsdetail_date.js"
            "fix_newspage_date.js"
            "fix_routes.js"
            "fix_scroll.js"
            "fix_secrets.sh"
            "fix_server.js"
            "fix_server2.js"
            "fix_server3.js"
            "format.js"
            "get_git_config.ts"
            "insert_screenshots.js"
            "live_app.html"
            "metadata.json"
            "output.html"
            "patch.js"
            "patch2.js"
            "patch3.js"
            "patch4.js"
            "patch5.js"
            "patch6.js"
            "patch7.js"
            "patch8.js"
            "patch_menu.js"
            "print-env.ts"
            "remove_chatbot.js"
            "replace-color.mjs"
            "restore_app.js"
            "restore_header_footer.js"
            "temp_news_tab.txt"
            "test-admin-encrypt.js"
            "test-admin.js"
            "test-chat.ts"
            "test-chunk-item.cjs"
            "test-curl.ts"
            "test-fetch.ts"
            "test-firestore.ts"
            "test-gemini.ts"
            "test-models-all.ts"
            "test-payload.mjs"
            "test-pow.mjs"
            "test-secure-links.ts"
            "test.js"
            "test_pull.js"
            "update_app.js"
            "update_app_home.js"
            "update_appdetails.js"
            "update_dashboard.patch"
            "update_gateway.js"
            "update_home.js"
            "update_html.js"
            "update_loading.js"
            "update_vite.js"
            "verify-db.js"
            "verify-rules.js"
            "write_files.js"
          )

          # List of files that should ONLY exist in Dex (Public)
          PUBLIC_ONLY_FILES=(
            "src/pages/About.tsx"
            "src/pages/AppDetails.tsx"
            "src/pages/BlogDetailPage.tsx"
            "src/pages/Blogs.tsx"
            "src/pages/Contact.tsx"
            "src/pages/Developers.tsx"
            "src/pages/Disclaimer.tsx"
            "src/pages/Ethics.tsx"
            "src/pages/GatewayPage.tsx"
            "src/pages/Home.tsx"
            "src/pages/NewApps.tsx"
            "src/pages/NewsDetailPage.tsx"
            "src/pages/NewsPage.tsx"
            "src/pages/Notice.tsx"
            "src/pages/Privacy.tsx"
            "src/pages/Responsibility.tsx"
            "src/pages/Terms.tsx"
            "src/pages/VideoDetailPage.tsx"
            "src/pages/VideosPage.tsx"
            "src/components/AccordionItem.tsx"
            "src/components/AppsTab.tsx"
            "src/components/BlogsTab.tsx"
            "src/components/FallbackRouteMatcher.tsx"
            "src/components/GlobalSearch.tsx"
            "src/components/LanguageSelector.tsx"
            "src/components/PlayStoreRatingSection.tsx"
            "src/components/PlayStoreUI.tsx"
            "src/components/PublicChatbot.tsx"
            "src/components/StarRatingFeedback.tsx"
            "src/components/SupportWidget.tsx"
            "src/components/Ticker.tsx"
            "src/components/UserReviews.tsx"
            "src/components/WebsiteTitleHero.tsx"
            "public/"
          )

          SOURCE_DIR=$(pwd)
          PARENT_DIR=$(dirname "$SOURCE_DIR")

          sync_repo() {
            REPO_NAME=$1
            REPO_URL=$2
            TYPE=$3 # "public" or "admin"

            echo "--- Syncing to $REPO_NAME ($TYPE) ---"
            cd "$PARENT_DIR"
            rm -rf "${REPO_NAME}_repo"
            
            # Common excludes - strictly prevent secrets/backups from leaking anywhere unvetted
            RSYNC_EXCLUDES="--exclude=.git --exclude=.github --exclude=node_modules --exclude=dist --exclude=src/lib/staticData.ts --exclude=src/lib/secureVault.ts"

            if git clone "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git" "${REPO_NAME}_repo"; then
              cd "${REPO_NAME}_repo"
              git checkout -b main || git checkout main
              # Bulletproof Mirroring
              rsync -rv $RSYNC_EXCLUDES --delete "$SOURCE_DIR/" .
            else
              mkdir -p "${REPO_NAME}_repo"
              cd "${REPO_NAME}_repo"
              git init
              git remote add origin "https://x-access-token:${PAT}@github.com/yonoapptransparency/${REPO_NAME}.git"
              git checkout -b main
              rsync -rv $RSYNC_EXCLUDES "$SOURCE_DIR/" .
            fi
            
            # Explicitly remove .github to prevent workflow nesting/looping
            rm -rf .github

            if [ "$TYPE" = "public" ]; then
              echo "Enforcing Public-Only Dex Isolation..."
              echo '{"version": 2, "outputDirectory": "dist", "buildCommand": "npm run build", "rewrites": [{ "source": "/(.*)", "destination": "/index.html" }]}' > vercel.json
              for file in "${ADMIN_ONLY_FILES[@]}"; do
                rm -rf "$file"
              done

              # Strip any residual maintenance, test, or config files from root of Dex
              find . -maxdepth 1 -name "*.js" ! -name "eslint.config.mjs" ! -name "eslint.config.cjs" ! -name "postcss.config.js" ! -name "tailwind.config.js" -exec rm -f {} +
              find . -maxdepth 1 -name "*.ts" ! -name "vite.config.ts" -exec rm -f {} +
              find . -maxdepth 1 -name "*.sh" -exec rm -f {} +
              find . -maxdepth 1 -name "*.patch" -exec rm -f {} +
              find . -maxdepth 1 -name "*.html" ! -name "index.html" -exec rm -f {} +

              if [ -f "strip-admin-from-dex.js" ]; then
                node strip-admin-from-dex.js
                rm -f strip-admin-from-dex.js
              fi
              rm -f strip-public-from-masterworld.js
            fi

            if [ "$TYPE" = "admin" ]; then
              echo "Enforcing Admin-Only Masterworld Isolation..."
              # 1. Strip all explicit public-only files
              for file in "${PUBLIC_ONLY_FILES[@]}"; do
                rm -rf "$file"
              done
              
              # 2. Strict Allowlist enforcement for pages and components
              echo "Purging non-admin pages..."
              find src/pages -type f ! -name "AdminDashboard.tsx" ! -name "AdminLogin.tsx" -delete
              
              echo "Purging non-admin components..."
              find src/components -type f ! -name "AdminLogin.tsx" ! -name "ClearanceButton.tsx" ! -name "FirebaseStatusIndicator.tsx" ! -name "FirebaseStatusPanel.tsx" ! -name "NewsTab.tsx" ! -name "SecurityTab.tsx" ! -name "GlobalErrorBoundary.tsx" -delete

              # 3. Clean App.tsx routes
              if [ -f "strip-public-from-masterworld.js" ]; then
                node strip-public-from-masterworld.js
                rm -f strip-public-from-masterworld.js
              fi
              rm -f strip-admin-from-dex.js
            fi

            git add .
            if [ -n "$(git status --porcelain)" ]; then
              if [ "$TYPE" = "admin" ]; then
                git commit -m "Auto-sync ($TYPE) [skip ci]"
              else
                git commit -m "Auto-sync ($TYPE)"
              fi
              git push -u origin main
            else
              echo "No changes for $REPO_NAME."
            fi
          }

          sync_repo "Dex" "yonoapptransparency/Dex" "public"
          sync_repo "masterworld" "yonoapptransparency/masterworld" "admin"
